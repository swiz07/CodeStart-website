<div *ngIf="loading" class="text-center my-4">
    Loading blog...
  </div>
  
  <div *ngIf="!loading && blog" class="ms-4">
    <h1>{{ blog.title }}</h1>
    <p class="text-muted">Category: {{ blog.category }}</p>
    <img [src]="blog.coverImage" class="img-fluid mb-3">
    <p>{{ blog.content }}</p>

  </div>
  
  <div *ngIf="!loading && !blog">
    <p>Blog not found.</p>
  </div>
