<!-- Loading state -->
<div *ngIf="loading" class="text-center my-4">
  Loading course details...
</div>

<!-- Course details -->
<section *ngIf="course && !loading" class=" ms-3 mb-4">
  <h1>{{ course.title }}</h1>
  <p>{{ course.description }}</p>
  <p>Category: {{ course.category }}</p>
  <p>Language: {{ course.language }}</p>
  <p>Duration: {{ course.course_duration }} hours</p>
  <p>Difficulty: {{ course.difficulty_level }}</p>

  <hr>

  <!-- Lessons accordion -->
  <h3>Lessons</h3>
  <div *ngIf="course.lessons && course.lessons.length > 0; else noLessons">
    <div class="accordion" id="lessonsAccordion">
      <div *ngFor="let lesson of course.lessons; let i = index" class="accordion-item">
        <h2 class="accordion-header" [id]="'heading' + i">
          <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
            [attr.data-bs-target]="'#collapse' + i" aria-expanded="false"
            [attr.aria-controls]="'collapse' + i">
            Lesson {{ i + 1 }}: {{ lesson.title || 'Lesson Title' }}
          </button>
        </h2>
        <div [id]="'collapse' + i" class="accordion-collapse collapse"
             [attr.aria-labelledby]="'heading' + i" data-bs-parent="#lessonsAccordion">
          <div class="accordion-body">
            <a [routerLink]="['/course', course._id, 'lesson', lesson._id]">Open Lesson</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <ng-template #noLessons>
    <p>No lessons found for this course.</p>
  </ng-template>
</section>
