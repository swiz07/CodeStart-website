<header>
  <nav class="navbar navbar-expand-lg navbar-light">
    <div class="container">
      <!--logo on the left side-->
      <a class="logo-text navbar-brand" routerLink="/">CodeStart</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <!--Main navigation links-->
        <div class="navbar-links">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link me-lg-4 active" routerLink="/">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link me-lg-4" routerLink="/course">Courses</a>
            </li>
            <li class="nav-item">
              <a class="nav-link me-lg-4" routerLink="/blog">Blog</a>
            </li>
            <li class="nav-item">
              <a class="me-lg-4 nav-link" routerLink="/contact">Contact</a>
            </li>
            <li class="nav-item" *ngIf="isLoggedIn">
              <a class="me-lg-4 nav-link" routerLink="/dashboard">Dashboard</a>
            </li>
          </ul>
        </div>

        <!--Right aligned nav links-->
        <div class="d-flex right-nav-links">
          <!--show login & signup only if user is not logged in-->
          <button *ngIf="!isLoggedIn" class="btn me-lg-4 login" routerLink="/login">Login</button>
          <button *ngIf="!isLoggedIn" class="btn signup" routerLink="/signup">Signup</button>

          <!--show logout if logged in-->
          <button *ngIf="isLoggedIn" (click)="logout()" class="btn me-lg-4 logout">Logout </button>

          <!--profile btn with pic, visible when the user is logged in-->
          <button *ngIf="isLoggedIn" (click)="goProfile()" class="profile-btn">
            <img src="assets/images/user.png" alt="Profile" class="profile-pic"/>
          </button>
        </div>
      </div>
    </div>
  </nav>
</header>
